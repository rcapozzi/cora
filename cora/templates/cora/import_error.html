<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORA — Import Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d10;
            --card-bg: rgba(21, 26, 35, 0.8);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-error: #ef4444;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(239, 68, 68, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            text-align: center;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid var(--text-error);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: var(--text-error);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .status-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.2);
            color: var(--text-error);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .details-box {
            text-align: left;
            background: rgba(10, 12, 16, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .details-box h3 {
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .details-box p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="error-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
            
            <h1>{{ reason }}</h1>
            <div class="status-badge">HTTP Status {{ status }}</div>

            <div class="details-box">
                <h3>Error Details</h3>
                <p>{{ details }}</p>
            </div>

            <a href="{% url 'application_import' %}" class="btn-back">Try Again</a>
        </div>
    </div>
</body>
</html>
