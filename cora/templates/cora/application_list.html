<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORA — Applications</title>
    <meta name="description" content="Search and filter COLA label applications in the CORA compliance review system.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg:          #0b0d10;
            --surface:     rgba(21, 26, 35, 0.85);
            --border:      rgba(255,255,255,0.07);
            --primary:     #6366f1;
            --primary-h:   #4f46e5;
            --accent:      #14b8a6;
            --text:        #f3f4f6;
            --muted:       #9ca3af;
            --danger:      #ef4444;
            --warning:     #f59e0b;
            --success:     #10b981;
            --radius:      12px;
            --shadow:      0 8px 30px -8px rgba(0,0,0,0.7);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%,   rgba(99,102,241,0.12) 0, transparent 55%),
                radial-gradient(at 100% 100%, rgba(20,184,166,0.08) 0, transparent 55%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .page-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 20%, var(--primary) 70%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-header .count-badge {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 50px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.2rem 0.75rem;
        }

        /* --- Filter card --- */
        .filter-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 180px; }
        .filter-group label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .filter-group input,
        .filter-group select {
            background: rgba(10,12,16,0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.6rem 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }
        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }

        /* --- Results table --- */
        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: rgba(10,12,16,0.5);
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            padding: 0.85rem 1.25rem;
            text-align: left;
            text-transform: uppercase;
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(99,102,241,0.06); }
        tbody td { color: var(--text); font-size: 0.9rem; padding: 0.9rem 1.25rem; vertical-align: middle; }
        .td-muted { color: var(--muted); font-size: 0.8rem; }

        /* Status badges */
        .badge {
            border-radius: 50px;
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.65rem;
            text-transform: uppercase;
        }
        .badge-RECEIVED           { background: rgba(99,102,241,0.15);  color: #a5b4fc; }
        .badge-IN_REVIEW          { background: rgba(245,158,11,0.15);  color: #fcd34d; }
        .badge-VERIFIED           { background: rgba(20,184,166,0.15);  color: #5eead4; }
        .badge-APPROVED           { background: rgba(16,185,129,0.15);  color: #6ee7b7; }
        .badge-REJECTED           { background: rgba(239,68,68,0.15);   color: #fca5a5; }
        .badge-NEEDS_CORRECTION   { background: rgba(249,115,22,0.15);  color: #fdba74; }
        .badge-CONDITIONALLY_APPROVED { background: rgba(139,92,246,0.15); color: #c4b5fd; }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--muted);
        }
        .pagination-links { display: flex; gap: 0.5rem; }
        .pagination-links a {
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 6px;
            color: var(--primary);
            padding: 0.35rem 0.75rem;
            text-decoration: none;
            transition: background 0.15s;
        }
        .pagination-links a:hover { background: rgba(99,102,241,0.2); }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
        }
        .empty-state svg { stroke: var(--muted); margin-bottom: 1rem; opacity: 0.4; }
        .empty-state p { font-size: 0.95rem; }

        .import-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-h));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
            white-space: nowrap;
        }
        .import-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,0.4); }
    </style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto;">

    <div class="page-header">
        <h1>Applications</h1>
        <span class="count-badge">{{ total }} total</span>
        <a href="{% url 'application_list' %}" class="import-btn" style="margin-left:auto;">+ Import</a>
    </div>

    <!-- Filter form — HTMX targets #results-section on any change -->
    <form id="filter-form" autocomplete="off">
        <div class="filter-card">
            <div class="filter-group" style="flex:2;">
                <label for="q">Search</label>
                <input id="q"
                       type="text"
                       name="q"
                       value="{{ q }}"
                       placeholder="Brand name, TTB ID, applicant…"
                       hx-get="{% url 'application_list' %}"
                       hx-target="#results-section"
                       hx-trigger="keyup changed delay:300ms"
                       hx-include="#filter-form"
                       hx-indicator="#spinner">
            </div>

            <div class="filter-group">
                <label for="status-filter">Status</label>
                <select id="status-filter"
                        name="status"
                        hx-get="{% url 'application_list' %}"
                        hx-target="#results-section"
                        hx-trigger="change"
                        hx-include="#filter-form"
                        hx-indicator="#spinner">
                    <option value="">All statuses</option>
                    {% for s in allowed_statuses %}
                    <option value="{{ s }}" {% if s == status %}selected{% endif %}>{{ s|title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="filter-group">
                <label for="type-filter">Product Type</label>
                <select id="type-filter"
                        name="product_type"
                        hx-get="{% url 'application_list' %}"
                        hx-target="#results-section"
                        hx-trigger="change"
                        hx-include="#filter-form"
                        hx-indicator="#spinner">
                    <option value="">All types</option>
                    {% for t in allowed_product_types %}
                    <option value="{{ t.value }}" {% if t.value == product_type %}selected{% endif %}>{{ t.label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Loading indicator -->
            <svg id="spinner" class="htmx-indicator" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="align-self:center;animation:spin 0.8s linear infinite;">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
        </div>
        <input type="hidden" name="sort_by" value="{{ sort_by }}">
        <input type="hidden" name="order"   value="{{ order }}">
        <input type="hidden" name="limit"   value="{{ limit }}">
    </form>

    <!-- Results — swapped by HTMX -->
    <div id="results-section">
        {% include 'cora/partials/application_table.html' %}
    </div>

</div>
<style>
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Fix built-in Django template filter workaround */
    select option { background: #1a1f2b; color: #f3f4f6; }
</style>
</body>
</html>
